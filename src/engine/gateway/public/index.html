<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monday Daily</title>
    <link rel="stylesheet" href="/presence.css?v=4" />
  </head>
  <body>
    <main class="daily-app">
      <aside class="subject-rail" aria-label="Subjects">
        <div class="rail-brand">
          <div class="rail-mark">M</div>
          <div>
            <p class="rail-label">Monday</p>
            <h1>Daily</h1>
          </div>
        </div>

        <nav id="subjectNav" class="subject-nav" aria-label="Subject navigation"></nav>
      </aside>

      <section class="daily-stage">
        <header class="stage-header">
          <div>
            <p id="stageEyebrow" class="stage-eyebrow">Monday Daily</p>
            <h2 id="stageTitle" class="stage-title">Loading your morning briefing...</h2>
          </div>
          <p id="stageSubheading" class="stage-subheading"></p>
        </header>

        <section class="presenter-shell">
          <div id="presenceBanner" class="presence-banner" hidden></div>

          <article class="monday-voice">
            <div class="voice-mark">Monday</div>
            <div class="voice-copy">
              <p id="messageEyebrow" class="message-eyebrow">Briefing</p>
              <div id="messageThread" class="message-thread" aria-live="polite"></div>
            </div>
          </article>

          <section id="propStage" class="prop-stage" aria-live="polite"></section>

          <footer class="reveal-controls">
            <button id="stayHereButton" class="secondary-button" type="button">Stay here</button>
            <button id="askAboutButton" class="ghost-button" type="button">Ask about this</button>
            <button id="nextInsightButton" class="primary-button" type="button">Continue</button>
          </footer>
        </section>

        <section class="composer-shell" aria-label="Talk to Monday">
          <div class="composer-header">
            <span>Talk to Monday</span>
            <span class="composer-note">The workspace supports the answer. It never becomes the answer.</span>
          </div>

          <section id="conversationLog" class="conversation-log" hidden aria-live="polite"></section>

          <form id="presenceComposer" class="composer-form" autocomplete="off">
            <label class="sr-only" for="presenceInput">Talk to Monday</label>
            <textarea
              id="presenceInput"
              rows="1"
              placeholder="Talk to Monday..."
              enterkeyhint="send"
            ></textarea>
            <button class="primary-button" type="submit">Send</button>
          </form>
        </section>
      </section>
    </main>

    <script src="/presence.js?v=4"></script>
  </body>
</html>
